server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index invictus-landing.html;

    # Security headers (apply globally)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Root: serve landing as index
    location = / {
        try_files /invictus-landing.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Serve robots.txt and other real files; do NOT fall back to landing for unknown paths
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|webp|gif|ico|svg|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css text/plain text/xml application/javascript application/xml image/svg+xml;
    gzip_min_length 256;
}
